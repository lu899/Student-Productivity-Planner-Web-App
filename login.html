<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Images/bookOpenIcon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/13dbe94116.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Sign In</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="Images/bookOpenIcon.png" alt="Book Open Icon"> 
                <span>StudyFlow</span>
            </div>

            <a href="index.html">Home</a>
        </nav>
    </header>
    <main>
        <section class="user-details card">
            <h1 class="primary-text">Sign In</h1>
            <h6 class="secondary-text">Welcome back, your goals missed you.</h6>
            <div class="details-container">
                <div class="details-div">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="details-div">
                    <label for="password">Password:</label>
                    <input type="password" id="login-password" autocomplete="new-password" placeholder="Enter your password">
                    <span class="show-password"><i class="fa-regular fa-eye"></i></span>
                    <span id="forgot-pass" class="forgot">Forgot password?</span>
                </div>      
            </div>
            <button id="login" class="btn">Sign In</button>
            <p class="secondary-text">or sign in with</p>
            <div class="icons flex">
                <i class="fa-brands fa-google" id="google-login"></i>
            </div>
            <p class="sign-in">Don't have an account? <a href="register.html">Sign Up</a></p>
        </section>

        <div id="forgot-password-section">
            <div class="forgot-modal form">
                <input type="email" id="reset-email" placeholder="Enter your registered email">
                <button onclick="sendResetEmail()" class="btn">Send Reset Link</button>
                <button id="close-btn" class="btn">Close modal</button>
            </div>
        </div>
    </main>
    
    <script type="module" src="JS/login_register.js"></script>
</body>
</html>
