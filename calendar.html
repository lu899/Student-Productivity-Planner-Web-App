<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Images/bookOpenIcon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/13dbe94116.js" crossorigin="anonymous"></script>
    <title>StudyFlow Calender</title>
</head>
<body>
    <div class="left-side linear-gradient visible">
            <div class="logo">
                <img src="Images/bookOpenIcon.png" alt="Book Open Icon"> 
                <h2>StudyFlow</h2>
            </div>

            <div class="nav-list">
                <ul>
                    <li>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-open-icon lucide-book-open"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
                        <a href="dashboard.html">Dashboard</a></li>

                    <li>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-square-check-big-icon lucide-square-check-big"><path d="M21 10.656V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h12.344"/><path d="m9 11 3 3L22 4"/></svg> 
                        <a href="tasks.html">Tasks</a>
                    </li>

                    <li class="active">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-icon lucide-calendar"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
                        <a href="calendar.html">Calendar</a>
                    </li>

                    <li>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-target-icon lucide-target"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                        <a href="goals.html">Goals</a>
                    </li>

                    <li>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
                        <a href="tracker.html">Time Tracker</a>
                    </li>

                    <li>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trending-up-icon lucide-trending-up"><path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/></svg>
                        <a href="analytics.html">Analytics</a>
                    </li>

                    <li>
                       <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-icon lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <button id="log-out">Log out</button>
                    </li>
                </ul>
            </div>
            <div class="study-streak active">
                <p>Study Streak</p>
                <p class="streak bold">7 Days 🔥</p>
             </div>
    </div>  
    <div class="container">
        <div class="header">
            <h2>📅 StudyFlow Calendar</h2>
            <span class="menu-bar" onclick="switchView('day')"><i class="fa-solid fa-bars"></i></span>
        </div>

        <div class="calender-controls">
            <div class="view-controls">
                <button class="view-btn active-cal" onclick="switchView('month')">Month</button>
                <button class="view-btn" onclick="switchView('week')">Week</button>
                <button class="view-btn" onclick="switchView('day')">Day</button>
            </div>
            <div class="btn-controls">
                <button class="tab-btn"><i class="fa-solid fa-arrow-left"></i></button>
                <button class="tab-btn">Today</button>
                <button class="tab-btn"><i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>
        <h2 class="month-label" id="monthYear"></h2>

        <div class="month-view" id="monthView">
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        
        <div class="week-view" id="weekView">
            <div class="week-grid" id="weekGrid"></div>
        </div>

        <div class="day-view" id="dayView">
            <div class="day-grid" id="dayGrid"></div>
            <div id="daySchedule"></div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #3b82f6;"></div>
                <p class="legend-title">Study session</p>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ef4444;"></div>
                <p class="legend-title">Exam</p>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #f59e0b;"></div>
                <p class="legend-title">Assignment</p>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #10b981;"></div>
                <p class="legend-title">Break</p>
            </div>
        </div>
    </div>

    <button class="add-event-btn" onclick="openModal()"><i class="fa-solid fa-plus"></i></button>

    <div class="modal" id="eventModal">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title">Add New Event</h1>
                <span class="close-btn" onclick="closeModal()"><i class="fa-solid fa-circle-xmark"></i></span>
            </div>
            <form id="eventForm" onsubmit="addEvent(event)">
                <div class="form">
                    <label for="eventTitle">Event Title* :</label>
                    <input type="text" id="eventTitle" placeholder="e.g., Math Study Session" required>
                </div>
            
                <div class="form">
                    <label for="eventType">Event Type* :</label>
                    <select name="eventType" id="eventType" required>
                        <option value="assignment">Assignment</option>
                        <option value="study">Study Session</option>
                        <option value="project">Project</option>
                        <option value="exam">Exam</option>
                        <option value="break">Break</option>
                    </select>
                </div>
                
                <div class="form">
                    <label for="eventDate">Date* :</label>
                    <input type="date" name="eventDate" id="eventDate" required>
                </div>
                <div class="form">
                    <label for="eventStartTime">Start Time* :</label>
                    <input type="time" name="eventStartTime" id="eventStartTime" required>
                </div>            
                
                <div class="form">
                    <label for="eventEndTime">End Time* :</label>
                    <input type="time" name="eventEndTime" id="eventEndTime" required>
                </div> 
                
                <div class="form">
                    <label for="eventDescription">Description (optional) :</label>
                    <textarea name="eventDescription" id="eventDescription" rows="3" placeholder="Add notes or details..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Submit</button>
            </form>            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
