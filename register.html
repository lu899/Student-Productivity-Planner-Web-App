<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Images/bookOpenIcon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/13dbe94116.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Sign Up</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="Images/bookOpenIcon.png" alt="Book Open Icon"> 
                <span>StudyFlow</span>
            </div>
            <a href="index.html">Home</a>
        </nav>
    </header>
    <main>
        <section class="user-details card">
            <h1 class="primary-text">Sign Up</h1>
            <h6 class="secondary-text">Begin your productivity era with StudyFlow</h6>
            <div class="details-container">
                <div class="details-div">
                    <label for="first-name">First name:</label>
                    <input type="text" id="first-name" placeholder="Enter your first name">
                </div>

                <div class="details-div">
                    <label for="last-name">Last name:</label>
                    <input type="text" id="last-name" placeholder="Enter your last name">
                </div>

                <div class="details-div">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="details-div">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter your password">
                    <span class="show-password"><i class="fa-regular fa-eye"></i></span>
                    <p id="pass-strength"></p>
                </div>

                <div class="details-div">
                    <label for="confirm-password">Confrim Password:</label>
                    <input type="text" id="confirm-password" placeholder="Confirm your password">
                    <span class="show-password"><i class="fa-regular fa-eye"></i></span>
                </div>
            </div>
            <button id="sign-up" class="btn">Sign Up</button>
            <p class="sign-in">Already have an account? <a href="login.html" class="blue-text">Sign in</a></p>
        </section>
    </main>
    <script type="module" src="login_register.js"></script>
</body>
</html>
